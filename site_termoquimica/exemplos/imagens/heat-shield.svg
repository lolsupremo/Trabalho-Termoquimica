<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="radGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <!-- Fundo escuro -->
  <rect width="400" height="300" fill="#0a0a0a" rx="20"/>
  
  <!-- Radiador -->
  <rect x="60" y="60" width="280" height="180" rx="20" fill="url(#radGrad)" stroke="#fff" stroke-width="3"/>
  
  <!-- Aletas -->
  <line x1="80" y1="90" x2="320" y2="90" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="110" x2="320" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="130" x2="320" y2="130" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="150" x2="320" y2="150" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="170" x2="320" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="190" x2="320" y2="190" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="210" x2="320" y2="210" stroke="#333" stroke-width="2"/>
  
  <!-- Escudo protetor -->
  <path d="M 130 60 L 200 30 L 270 60 L 270 130 C 270 170 200 190 200 190 C 200 190 130 170 130 130 Z" 
        fill="url(#shieldGrad)" opacity="0.85" stroke="#fff" stroke-width="2"/>
  
  <!-- Texto no escudo -->
  <text x="200" y="110" text-anchor="middle" fill="#fff" font-size="11" font-weight="900">HEAT</text>
  <text x="200" y="125" text-anchor="middle" fill="#fff" font-size="11" font-weight="900">SHIELD</text>
  <text x="200" y="140" text-anchor="middle" fill="#fff" font-size="11" font-weight="900">PRO™</text>
  
  <!-- Ondas de calor sendo dissipadas -->
  <path d="M 340 120 Q 355 110 370 120" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.6"/>
  <path d="M 345 140 Q 360 130 375 140" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.4"/>
  <path d="M 340 160 Q 355 150 370 160" fill="none" stroke="#fb923c" stroke-width="2" opacity="0.5"/>
</svg>