  <text x="270" y="150" fill="#bae6fd" font-size="16" opacity="0.6">❄</text>
  <text x="130" y="200" fill="#bae6fd" font-size="14" opacity="0.7">❄</text>
  
  <!-- Ondas de frio -->
  <path d="M 100 160 Q 115 150 130 160 Q 145 170 160 160" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
  <path d="M 240 170 Q 255 160 270 170 Q 285 180 300 170" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
</svg>