  <rect x="160" y="20" width="80" height="50" rx="10" fill="#bae6fd" stroke="#fff" stroke-width="2"/>
  
  <!-- Rótulo -->
  <rect x="150" y="100" width="100" height="60" rx="10" fill="#000" stroke="#38bdf8" stroke-width="1"/>
  <text x="200" y="125" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="900">MAREA</text>
  <text x="200" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="900">COOL™</text>
  
  <!-- Flocos de neve -->
