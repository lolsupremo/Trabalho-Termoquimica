<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fundo escuro -->
  <rect width="400" height="300" fill="#0a0a0a" rx="20"/>
  
  <!-- Bloco do motor -->
  <rect x="60" y="50" width="280" height="200" rx="25" fill="url(#blockGrad)" stroke="#fff" stroke-width="3"/>
  
  <!-- Pistões -->
  <rect x="80" y="80" width="55" height="140" rx="8" fill="#1a1a1a" stroke="#fb923c" stroke-width="2"/>
  <rect x="150" y="80" width="55" height="140" rx="8" fill="#1a1a1a" stroke="#fb923c" stroke-width="2"/>
  <rect x="220" y="80" width="55" height="140" rx="8" fill="#1a1a1a" stroke="#fb923c" stroke-width="2"/>
  <rect x="290" y="80" width="40" height="140" rx="8" fill="#1a1a1a" stroke="#fb923c" stroke-width="2"/>
  
  <!-- Escudo térmico -->
  <rect x="75" y="65" width="250" height="35" rx="12" fill="#075985" stroke="#38bdf8" stroke-width="2" filter="url(#glow)"/>
  <text x="200" y="88" text-anchor="middle" fill="#fff" font-size="14" font-weight="900">THERMOBLOCK™</text>
  
  <!-- Ícone de proteção -->
  <text x="200" y="210" text-anchor="middle" fill="#fff" font-size="48">🛡️</text>
  
  <!-- Medidor de temperatura -->
  <rect x="45" y="100" width="8" height="120" rx="4" fill="#000" stroke="#fff" stroke-width="1"/>
  <rect x="46" y="140" width="6" height="79" rx="3" fill="#38bdf8"/>
</svg>